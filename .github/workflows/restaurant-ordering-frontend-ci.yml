name: restaurant-ordering-frontend CI
on:
  pull_request:
    paths: ['restaurant-ordering-frontend/**']
  push:
    branches: [main]
    paths: ['restaurant-ordering-frontend/**']
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: restaurant-ordering-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: restaurant-ordering-frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
